[mypy]
# Basic type checking configuration for QuantoniumOS
python_version = 3.11
# Files and directories to check
files = .
# Error reporting
show_error_codes = true
show_column_numbers = true
pretty = true
# Import discovery
namespace_packages = true
explicit_package_bases = true
# Warnings
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
# Disable strict mode for now to allow CI to pass
strict = false
check_untyped_defs = false
disallow_untyped_defs = false
disallow_incomplete_defs = false
no_implicit_optional = false
# Exclude problematic directories and files
exclude = (?x)(
    ^build/|
    ^dist/|
    ^\.venv/|
    ^benchmark_results/|
    ^verification/|
    ^__pycache__/|
    ^\.git/|
    ^test_build/|
    ^test_env_local/|
    ^archive/|
    ^third_party/|
    \.egg-info/|
    \.so$|
    \.cpp$|
    \.tex$|
    \.json$
)

# Module-specific overrides
[mypy-tests.*]
ignore_errors = true

[mypy-scripts.*]
ignore_errors = true

[mypy-numpy.*]
ignore_missing_imports = true

[mypy-matplotlib.*]
ignore_missing_imports = true

[mypy-scipy.*]
ignore_missing_imports = true

[mypy-cryptography.*]
ignore_missing_imports = true 