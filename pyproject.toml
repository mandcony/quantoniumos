[build-system] requires = ["setuptools>=45", "wheel", "setuptools_scm[toml]>=6.2"] build-backend = "setuptools.build_meta" [project] name = "quantoniumos" version = "0.1.0" description = "Advanced cryptographic operating system with Resonance Fourier Transform algorithms" readme = "README.md" license = { text = "MIT" } authors = [ { name = "Luis Minier" } ] requires-python = ">=3.9" classifiers = [ "Development Status :: 3 - Alpha", "Intended Audience :: Developers", "License :: OSI Approved :: MIT License", "Programming Language :: Python :: 3", "Programming Language :: Python :: 3.9", "Programming Language :: Python :: 3.10", "Programming Language :: Python :: 3.11", "Programming Language :: Python :: 3.12", "Topic :: Security :: Cryptography", "Topic :: Scientific/Engineering :: Mathematics" ] dependencies = [ "numpy==2.3.2", # Pinned for eigendecomposition reproducibility "scipy==1.16.0", # Pinned for numerical stability "cryptography>=3.4.8", "flask>=2.0.0", "flask-cors>=4.0.0", # Enable cross-origin requests for API "pydantic>=2.0.0", # Data validation for API "pyjwt>=2.0.0", # JWT token handling "pycryptodome>=3.15.0" ] [project.optional-dependencies] dev = [ "pytest>=7.0.0", "pytest-cov>=4.0.0", "mypy>=1.0.0", "ruff>=0.1.0", "pre-commit>=3.0.0" ] [project.scripts] quantonium-validate = "quantoniumos.validate_production:main" [tool.setuptools.packages.find] where = ["."] include = ["quantoniumos*", "core*", "utils*", "auth*", "api*"] exclude = ["tests*", "build*", "dist*", "*.egg-info*"] [tool.setuptools.package-data] quantoniumos = ["py.typed"] 