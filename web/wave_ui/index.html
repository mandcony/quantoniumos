<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantoniumOS - Wave UI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="wave.css">
</head>
<body>
    <div class="wave-container">
        <header class="wave-header">
            <h1 class="quantum-title">QuantoniumOS Wave Interface</h1>
            <div class="quantum-status">
                <span class="status-dot active"></span>
                <span>Quantum Field Active</span>
            </div>
        </header>
        
        <main class="wave-main">
            <div class="wave-controls">
                <div class="control-group">
                    <label for="frequency">Frequency</label>
                    <input type="range" id="frequency" min="0.1" max="10" step="0.1" value="1">
                    <span id="freq-value">1.0</span>
                </div>
                
                <div class="control-group">
                    <label for="amplitude">Amplitude</label>
                    <input type="range" id="amplitude" min="0.1" max="2" step="0.1" value="1">
                    <span id="amp-value">1.0</span>
                </div>
                
                <div class="control-group">
                    <label for="wave-type">Wave Type</label>
                    <select id="wave-type">
                        <option value="sine">Sine</option>
                        <option value="cosine">Cosine</option>
                        <option value="quantum">Quantum</option>
                    </select>
                </div>
                
                <button id="start-wave" class="quantum-btn">Start Wave</button>
                <button id="stop-wave" class="quantum-btn secondary">Stop</button>
            </div>
            
            <div class="wave-display">
                <canvas id="wave-canvas" width="800" height="400"></canvas>
            </div>
            
            <div class="wave-data">
                <div class="data-column">
                    <h3>Real-time Data</h3>
                    <div id="wave-stats"></div>
                </div>
                <div class="data-column">
                    <h3>Quantum Properties</h3>
                    <div id="quantum-props"></div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="main.js"></script>
    <script src="wave_visualization.js"></script>
</body>
</html>
