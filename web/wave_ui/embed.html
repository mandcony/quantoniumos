<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantoniumOS Wave UI - Embedded</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="wave.css">
    <style>
        .embed-container {
            width: 100%;
            height: 400px;
            background: var(--dark-bg);
            border: 1px solid var(--quantum-blue);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .embed-header {
            background: var(--card-bg);
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: between;
            align-items: center;
        }
        
        .embed-title {
            color: var(--quantum-blue);
            font-size: 1.2rem;
            margin: 0;
        }
        
        .embed-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .mini-control {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .mini-control label {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
        
        .mini-control input {
            width: 60px;
            accent-color: var(--quantum-blue);
        }
        
        .embed-canvas {
            width: 100%;
            height: calc(100% - 50px);
            background: var(--darker-bg);
        }
    </style>
</head>
<body>
    <div class="embed-container">
        <div class="embed-header">
            <h3 class="embed-title">Quantum Wave Visualization</h3>
            <div class="embed-controls">
                <div class="mini-control">
                    <label>Freq:</label>
                    <input type="range" id="mini-freq" min="0.1" max="5" step="0.1" value="1">
                </div>
                <div class="mini-control">
                    <label>Amp:</label>
                    <input type="range" id="mini-amp" min="0.1" max="2" step="0.1" value="1">
                </div>
                <button id="mini-start" class="quantum-btn" style="padding: 5px 10px; font-size: 0.8rem;">Start</button>
            </div>
        </div>
        <canvas id="embed-canvas" class="embed-canvas"></canvas>
    </div>
    
    <script src="wave_visualization.js"></script>
    <script>
        class EmbedWaveInterface {
            constructor() {
                this.visualization = new WaveVisualization('embed-canvas', {
                    backgroundColor: '#050505',
                    waveColor: '#00ffff',
                    gridColor: '#222222',
                    glowIntensity: 8,
                    particleCount: 20
                });
                
                this.isRunning = false;
                this.setupControls();
                this.visualization.addWave(1, 1, 0, '#00ffff');
            }
            
            setupControls() {
                const freqSlider = document.getElementById('mini-freq');
                const ampSlider = document.getElementById('mini-amp');
                const startBtn = document.getElementById('mini-start');
                
                freqSlider.addEventListener('input', (e) => {
                    this.visualization.setWaveFrequency(0, parseFloat(e.target.value));
                });
                
                ampSlider.addEventListener('input', (e) => {
                    this.visualization.setWaveAmplitude(0, parseFloat(e.target.value) * 50);
                });
                
                startBtn.addEventListener('click', () => {
                    if (!this.isRunning) {
                        this.visualization.startAnimation();
                        startBtn.textContent = 'Stop';
                        this.isRunning = true;
                    } else {
                        this.visualization.stopAnimation();
                        startBtn.textContent = 'Start';
                        this.isRunning = false;
                    }
                });
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            window.embedWave = new EmbedWaveInterface();
        });
    </script>
</body>
</html>
