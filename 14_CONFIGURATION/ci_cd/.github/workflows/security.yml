name: Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0'  # Run weekly on Sundays
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  bandit-scan:
    name: "Bandit Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] safety

      - name: Run Bandit security scan
        run: |
          bandit -r . -x tests,build -f json -o bandit-report.json || true
          
      - name: Convert Bandit to SARIF
        run: |
          python -c "
          import json
          import uuid
          from datetime import datetime
          
          # Read Bandit report
          try:
              with open('bandit-report.json', 'r') as f:
                  bandit_data = json.load(f)
          except:
              bandit_data = {'results': []}
          
          # Create SARIF format
          sarif = {
              'version': '2.1.0',
              # Removed schema property as it's not allowed by the SARIF validator
              'runs': [{
                  'tool': {
                      'driver': {
                          'name': 'Bandit',
                          'version': '1.7.5',
                          'informationUri': 'https://bandit.readthedocs.io/',
                          'rules': []
                      }
                  },
                  'results': [],
                  'properties': {
                      'startDateTime': datetime.utcnow().isoformat() + 'Z'
                  }
              }]
          }
          
          # Convert Bandit results to SARIF
          for result in bandit_data.get('results', []):
              rule_id = result.get('test_id', 'unknown')
              message = result.get('issue_text', 'Security issue detected')
              filename = result.get('filename', '')
              line_number = result.get('line_number', 1)
              severity = result.get('issue_severity', 'medium').lower()
              
              # Map severity levels
              level = 'warning'
              if severity in ['high', 'critical']:
                  level = 'error'
              elif severity == 'low':
                  level = 'note'
              
              sarif_result = {
                  'ruleId': rule_id,
                  'message': {'text': message},
                  'level': level,
                  'locations': [{
                      'physicalLocation': {
                          'artifactLocation': {'uri': filename},
                          'region': {'startLine': line_number}
                      }
                  }]
              }
              sarif['runs'][0]['results'].append(sarif_result)
          
          # Write SARIF file
          with open('bandit.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          
          print(f'SARIF file created with {len(sarif[\"runs\"][0][\"results\"])} issues')
          "

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif
          category: bandit
        # Removed continue-on-error: security analysis failures must stop the pipeline

      - name: Run Safety check for vulnerabilities
        run: |
          safety check --json --output safety-report.json || true
          echo "Safety scan completed"

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            bandit.sarif
            safety-report.json
          retention-days: 30

  dependency-review:
    name: "Dependency Review"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Dependency Review
        uses: actions/dependency-review-action@v3
        with:
          fail-on-severity: high
