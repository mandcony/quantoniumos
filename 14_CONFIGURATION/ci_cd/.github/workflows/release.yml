name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build and Create Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools twine
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Build Python wheel
        run: |
          python setup.py sdist bdist_wheel
      
      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1.11
        with:
          cmake-version: '3.15.x'
      
      - name: Set up GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: 9
      
      - name: Build C++ library
        run: |
          mkdir -p build
          cd build
          cmake ..
          cmake --build . --config Release
      
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      
      - name: Build Rust library
        run: |
          cd resonance-core-rs
          cargo build --release
      
      - name: Package artifacts
        run: |
          # Create directories
          mkdir -p release_artifacts/python
          mkdir -p release_artifacts/cpp
          mkdir -p release_artifacts/rust
          mkdir -p release_artifacts/docs
          
          # Copy Python artifacts
          cp dist/*.whl release_artifacts/python/
          cp dist/*.tar.gz release_artifacts/python/
          
          # Copy C++ artifacts
          cp -r build/lib/* release_artifacts/cpp/ || echo "No C++ libs to copy"
          cp -r build/include/* release_artifacts/cpp/ || echo "No C++ headers to copy"
          
          # Copy Rust artifacts
          cp resonance-core-rs/target/release/libresonance_core.* release_artifacts/rust/ || echo "No Rust libs to copy"
          cp -r resonance-core-rs/target/doc/* release_artifacts/docs/rust/ || echo "No Rust docs to copy"
          
          # Copy documentation
          cp -r docs/* release_artifacts/docs/
          
          # Create archives
          cd release_artifacts
          zip -r ../quantoniumos-${{ github.ref_name }}.zip .
          tar -czvf ../quantoniumos-${{ github.ref_name }}.tar.gz .
      
      - name: Generate SHA256 checksums
        run: |
          sha256sum quantoniumos-${{ github.ref_name }}.zip > quantoniumos-${{ github.ref_name }}.zip.sha256
          sha256sum quantoniumos-${{ github.ref_name }}.tar.gz > quantoniumos-${{ github.ref_name }}.tar.gz.sha256
      
      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION_CLEAN=${VERSION#v}
          echo "Extracting changelog for $VERSION_CLEAN"
          
          # Extract changelog for this version (assuming CHANGELOG.md exists)
          CHANGELOG=$(awk -v version="$VERSION_CLEAN" '/^## \[/ { if (p) { exit }; if ($2 == "['version']") { p=1; next } } p' CHANGELOG.md || echo "No changelog found for this version")
          
          # Escape newlines and special characters for GitHub Actions
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"
          
          # Set output
          echo "::set-output name=changelog::$CHANGELOG"
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: QuantoniumOS ${{ github.ref_name }}
          body: |
            ## QuantoniumOS Release ${{ github.ref_name }}
            
            ${{ steps.changelog.outputs.changelog }}
            
            ### SHA-256 Checksums
            ```
            $(cat quantoniumos-${{ github.ref_name }}.zip.sha256)
            $(cat quantoniumos-${{ github.ref_name }}.tar.gz.sha256)
            ```
            
            ### Installation
            
            #### Python
            ```bash
            pip install quantoniumos-${{ github.ref_name }}.tar.gz
            ```
            
            #### C++
            See documentation for integration with your build system.
            
            #### Rust
            Add to your Cargo.toml:
            ```toml
            [dependencies]
            resonance-core-rs = { path = "path/to/extracted/rust" }
            ```
          draft: false
          prerelease: false
      
      - name: Upload ZIP Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./quantoniumos-${{ github.ref_name }}.zip
          asset_name: quantoniumos-${{ github.ref_name }}.zip
          asset_content_type: application/zip
      
      - name: Upload TAR.GZ Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./quantoniumos-${{ github.ref_name }}.tar.gz
          asset_name: quantoniumos-${{ github.ref_name }}.tar.gz
          asset_content_type: application/gzip
      
      - name: Upload SHA256 checksum files
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./quantoniumos-${{ github.ref_name }}.zip.sha256
          asset_name: quantoniumos-${{ github.ref_name }}.zip.sha256
          asset_content_type: text/plain
      
      - name: Upload TAR.GZ SHA256
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./quantoniumos-${{ github.ref_name }}.tar.gz.sha256
          asset_name: quantoniumos-${{ github.ref_name }}.tar.gz.sha256
          asset_content_type: text/plain

  publish-python:
    name: Publish Python Package
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools twine
      
      - name: Build and publish
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          python setup.py sdist bdist_wheel
          twine upload dist/*
