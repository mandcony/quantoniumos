[pytest]
testpaths = core/encryption
python_files = test_*.py
python_functions = test_*

[coverage:run]
source = core/encryption
omit = 
    */test_*.py
    */__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == "__main__":
    pass
    raise ImportError
