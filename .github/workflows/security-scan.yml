name: Security Scan

on:
  push:
    branches: [ main, sec/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] safety

      - name: Run Bandit security scan
        run: |
          bandit -r core/ -f json -o bandit-report.json || true
          
      - name: Convert Bandit to SARIF
        run: |
          python -c "
          import json
          import uuid
          from datetime import datetime
          
          # Read Bandit report
          try:
              with open('bandit-report.json', 'r') as f:
                  bandit_data = json.load(f)
          except:
              bandit_data = {'results': []}
          
          # Create SARIF format
          sarif = {
              'version': '2.1.0',
              'schema': 'https://docs.oasis-open.org/sarif/sarif/v2.1.0/cos02/schemas/sarif-schema-2.1.0.json',
              'runs': [{
                  'tool': {
                      'driver': {
                          'name': 'Bandit',
                          'version': '1.7.5',
                          'informationUri': 'https://bandit.readthedocs.io/'
                      }
                  },
                  'results': []
              }]
          }
          
          # Convert Bandit results to SARIF
          for result in bandit_data.get('results', []):
              sarif_result = {
                  'ruleId': result.get('test_id', 'unknown'),
                  'message': {'text': result.get('issue_text', 'Security issue detected')},
                  'level': 'warning' if result.get('issue_severity') == 'MEDIUM' else 'error',
                  'locations': [{
                      'physicalLocation': {
                          'artifactLocation': {'uri': result.get('filename', 'unknown')},
                          'region': {'startLine': result.get('line_number', 1)}
                      }
                  }]
              }
              sarif['runs'][0]['results'].append(sarif_result)
          
          # Write SARIF file
          with open('bandit.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          
          print('SARIF file created successfully')
          "

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif
          category: bandit
        continue-on-error: true
          
      - name: Run seccomp validation
        run: |
          # Start the container with seccomp profile
          docker run -d --name quantonium-test \
            --security-opt seccomp:./seccomp.json \
            --cap-drop=ALL \
            quantonium:latest
          
          # Give it a few seconds to start
          sleep 5
          
          # Run a simple test to verify seccomp is working
          # This test tries to use ptrace syscall and should fail
          TEST_RESULT=$(docker exec quantonium-test bash -c "python3 -c 'import ctypes; try: ctypes.CDLL(None).ptrace(0, 0, 0, 0); print(\"FAIL: Ptrace allowed\"); exit(1); except Exception as e: print(\"PASS: Ptrace blocked\"); exit(0);'" || echo "Container test failed")
          
          # Clean up the container
          docker stop quantonium-test
          docker rm quantonium-test
          
          # Check if the test passed
          if [[ $TEST_RESULT == *"PASS"* ]]; then
            echo "✅ Seccomp profile validation passed"
            exit 0
          else
            echo "❌ Seccomp profile validation failed"
            echo "Test result: $TEST_RESULT"
            exit 1
          fi