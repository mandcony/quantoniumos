name: Package Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test-wheel:
    name: "Build wheel and test in fresh container"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel twine
          
      - name: Build wheel
        run: |
          python -m build
          
      - name: Test wheel installation in fresh environment
        run: |
          # Create fresh virtual environment
          python -m venv test_env
          source test_env/bin/activate
          
          # Install wheel
          pip install dist/*.whl
          
          # Test basic imports
          python -c "import quantoniumos; print('✅ Package imports successfully')"
          
      - name: Validate package metadata
        run: |
          twine check dist/*
          
      - name: Test import structure
        run: |
          source test_env/bin/activate
          python -c "
          try:
              from quantoniumos.core import *
              print('✅ Core module imports')
          except ImportError as e:
              print(f'❌ Core import failed: {e}')
              exit(1)
          
          try:
              from quantoniumos.utils import *
              print('✅ Utils module imports') 
          except ImportError as e:
              print(f'❌ Utils import failed: {e}')
              exit(1)
          "
          
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v3
        with:
          name: wheels-python-${{ matrix.python-version }}
          path: dist/*.whl
          
  mypy-strict:
    name: "MyPy strict type checking"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install mypy
          pip install -e .
          
      - name: Run MyPy strict
        run: |
          mypy --config-file mypy.ini --strict core/ utils/ auth/ api/
