name: Package Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test-wheel:
    name: "Build wheel and test (reproducible)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install reproducible dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-repro.txt
          pip install -r requirements-dev-repro.txt
          pip install build wheel twine
          
      - name: Build wheel (reproducible)
        run: |
          # Use SOURCE_DATE_EPOCH for reproducible builds
          export SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)
          echo "Building wheel with reproducible timestamp: $SOURCE_DATE_EPOCH"
          python -m build --wheel
          echo "Wheel built successfully"
          ls -la dist/
          
      - name: Test wheel installation in fresh environment
        run: |
          echo "Creating virtual environment..."
          python -m venv test_env
          echo "Virtual environment created"
          
          echo "Installing wheel..."
          test_env/bin/python -m pip install --upgrade pip
          test_env/bin/python -m pip install dist/*.whl
          echo "Wheel installed successfully"
          
          echo "Testing basic import..."
          test_env/bin/python -c "import quantoniumos; print('[PASS] Package imports successfully')"
          echo "Basic import test completed"
          
      - name: Generate package checksums
        run: |
          cd dist/
          sha256sum *.whl > ../package-checksums.sha256
          cd ..
          echo "Package checksums:"
          cat package-checksums.sha256
          
      - name: Validate package metadata
        run: |
          echo "Validating package metadata..."
          twine check dist/*
          echo "Package metadata validation completed"
          
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantoniumos-wheel-build-${{ github.sha }}
          path: |
            dist/*.whl
            package-checksums.sha256
          retention-days: 30
          
  mypy-strict:
    name: "MyPy strict type checking (reproducible)"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install reproducible dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-repro.txt
          pip install -r requirements-dev-repro.txt
          
      - name: Run MyPy strict type checking
        run: |
          # Run strict mypy check with configuration from mypy.ini
          mypy quantoniumos/ || {
            echo "MyPy type checking failed"
            echo "Review mypy.ini configuration and fix type errors"
            exit 1
          }
          echo "MyPy strict type checking: PASSED"
