name: Cross-Implementation Validation

on:
  workflow_run:
    workflows: ["Green Wall CI Pipeline"]
    types:
      - completed

jobs:
  validate-cpp:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download C++ artifacts
      uses: actions/github-script@v6
      with:
        script: |
          const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
            owner: context.repo.owner,
            repo: context.repo.name,
            run_id: context.payload.workflow_run.id
          });
          const matchArtifact = artifacts.data.artifacts.find(artifact => artifact.name === "cpp-build-linux");
          const download = await github.rest.actions.downloadArtifact({
            owner: context.repo.owner,
            repo: context.repo.name,
            artifact_id: matchArtifact.id,
            archive_format: 'zip'
          });
          require('fs').writeFileSync('cpp-build.zip', Buffer.from(download.data));
    
    - name: Extract C++ build
      run: |
        unzip cpp-build.zip -d cpp-build
        chmod +x cpp-build/resonance-core
    
    - name: Run C++ validation
      run: |
        ./cpp-build/resonance-core --test-vectors public_test_vectors/vectors_ResonanceEncryption_encryption_latest.json
        
  validate-rust:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
    
    - name: Build Rust implementation
      working-directory: resonance-core-rs
      run: |
        cargo build --release
        
    - name: Run Rust validation
      working-directory: resonance-core-rs
      run: |
        cargo run --release --bin test-vector-validator -- ../public_test_vectors/vectors_ResonanceEncryption_encryption_latest.json
        
  compare-results:
    needs: [validate-cpp, validate-rust]
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Compare validation results
      run: |
        python scripts/compare_validation_results.py \
          public_test_vectors/vectors_ResonanceEncryption_encryption_latest.cpp.results.json \
          public_test_vectors/vectors_ResonanceEncryption_encryption_latest.results.json
