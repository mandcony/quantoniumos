name: QuantoniumOS Encryption Tests

on:
  push:
    paths:
      - 'core/encryption/**'
  pull_request:
    paths:
      - 'core/encryption/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, '3.10']

    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov

    - name: Run basic encryption tests
      run: |
        python -m pytest core/encryption/test_resonance.py -v

    - name: Run detailed avalanche tests
      run: |
        python core/encryption/detailed_avalanche_test.py

    - name: Run diffusion validation
      run: |
        python core/encryption/test_diffusion.py

    - name: Generate coverage report
      run: |
        pytest --cov=core.encryption --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v2
      with:
        file: ./coverage.xml
        fail_ci_if_error: true
