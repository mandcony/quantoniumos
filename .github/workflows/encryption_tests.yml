name: QuantoniumOS Encryption Tests

on:
  push:
    paths:
      - 'core/encryption/**'
      - '.github/workflows/encryption_tests.yml'
      - 'requirements.txt'
      - 'requirements-dev.txt'
  pull_request:
    paths:
      - 'core/encryption/**'
      - '.github/workflows/encryption_tests.yml'
      - 'requirements.txt'
      - 'requirements-dev.txt'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, '3.10', '3.11']
      fail-fast: false  # Continue with other versions if one fails

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
        pip install pytest pytest-cov

    - name: Run basic tests
      run: |
        # Run main encryption tests
        python core/encryption/fixed_resonance_encrypt.py
        if [ $? -ne 0 ]; then
          echo "Fixed resonance tests failed"
          exit 1
        fi

    - name: Run avalanche tests
      run: |
        # Run avalanche effect tests with reduced sample size for CI
        PYTHONPATH=. python core/encryption/detailed_avalanche_test.py --ci-mode
        if [ $? -ne 0 ]; then
          echo "Avalanche tests failed"
          exit 1
        fi

    - name: Run statistical tests
      run: |
        # Run lightweight statistical tests for CI
        PYTHONPATH=. python core/encryption/portable_statistical_tests.py --ci-mode
        if [ $? -ne 0 ]; then
          echo "Statistical tests failed"
          exit 1
        fi

    - name: Generate test report
      if: always()  # Run even if tests fail
      run: |
        echo "## Test Results" >> $GITHUB_STEP_SUMMARY
        echo "* Python Version: ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
        echo "* Results directory: test_results/" >> $GITHUB_STEP_SUMMARY

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-py${{ matrix.python-version }}
        path: |
          test_results/
          benchmark_results/
        retention-days: 7
